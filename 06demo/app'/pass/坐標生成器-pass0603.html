<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>平面直角座標系生成器</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f5f7fa; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            max-width: 1800px; 
            width: 100%; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .sidebar { 
            flex: 0 0 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-right: 1px solid #eef2f5; 
            padding-right: 15px; 
            max-height: 90vh;
            overflow-y: auto;
        }
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #fafbfc;
            border-radius: 8px;
            padding: 15px;
        }
        .right-sidebar {
            flex: 0 0 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-left: 1px solid #eef2f5;
            padding-left: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }
        h3 { margin: 0 0 10px 0; color: #333; font-size: 15px; border-bottom: 2px solid #007aff; padding-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        .row-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 5px 0 10px 0; }
        .checkbox-group input { width: auto; cursor: pointer; }
        .checkbox-group label { cursor: pointer; user-select: none; color: #007aff; font-weight: bold; }
        label { font-size: 13px; color: #555; font-weight: 500; }
        input, select { padding: 8px; border: 1px solid #ccd4dc; border-radius: 6px; font-size: 14px; width: 100%; }
        input[type="color"] { padding: 2px; height: 35px; cursor: pointer; }
        
        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; position: sticky; bottom: 0; background: white; padding-top: 10px; }
        .btn-download { background: #34c759; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; text-align: center;}
        .btn-download:hover { background: #28a745; }
        
        .action-bar { display: flex; gap: 8px; margin-bottom: 5px; }
        .btn-add { flex: 1; background: #007aff; color: white; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;}
        .btn-add:hover { background: #0056b3; }
        .select-quick { flex: 1; border: 1px solid #007aff; color: #007aff; background: white; font-weight: bold; cursor: pointer;}
        
        .btn-del { background: #ff3b30; color: white; padding: 4px 8px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;}
        
        .item-card { background: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; position: relative;}
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .tip-text { font-size: 11px; color: #888; margin-top: -3px; }
        .equation-box { background: #eef7ff; border-left: 4px solid #007aff; padding: 6px 10px; font-family: monospace; font-size: 13px; color: #111; font-weight: bold; margin-top: 2px; border-radius: 0 4px 4px 0; word-break: break-all; user-select: all; cursor: pointer; }
        .equation-box::before { content: "📋 方程式："; color: #007aff; font-size: 11px; display: block; margin-bottom: 2px; font-family: sans-serif; }

        .canvas-container {
            max-width: 100%;
            max-height: 80vh;
            overflow: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            background: white;
            border-radius: 6px;
        }
        canvas { display: block; background: white; }

        @media (max-width: 1200px) {
            .container { flex-direction: column; }
            .sidebar, .right-sidebar { border: none; padding: 0; max-height: none; flex: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div>
            <h3>1. 座標範圍設定</h3>
            <div class="row-group">
                <div class="control-group">
                    <label>X 軸最小值</label>
                    <input type="number" id="minX" value="-6" step="any">
                </div>
                <div class="control-group">
                    <label>X 軸最大值</label>
                    <input type="number" id="maxX" value="6" step="any">
                </div>
            </div>
            <div class="row-group">
                <div class="control-group">
                    <label>Y 軸最小值</label>
                    <input type="number" id="minY" value="-6" step="any">
                </div>
                <div class="control-group">
                    <label>Y 軸最大值</label>
                    <input type="number" id="maxY" value="6" step="any">
                </div>
            </div>
        </div>

        <div>
            <h3>2. 間距與字型</h3>
            <div class="control-group">
                <label>刻度頻率 (可小數)</label>
                <input type="number" id="step" value="1" step="any" min="0.001">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="textMask" checked>
                <label for="textMask" style="color: #555; font-weight: 500;">數字加上白底遮罩</label>
            </div>
            <div class="row-group">
                <div class="control-group">
                    <label>數字大小 (px)</label>
                    <input type="number" id="fontSize" value="16" min="6" max="40">
                </div>
                <div class="control-group">
                    <label>數字字體樣式</label>
                    <select id="fontWeight">
                        <option value="normal">標準 (Regular)</option>
                        <option value="bold" selected>粗體 (Bold)</option>
                    </select>
                </div>
            </div>
        </div>

        <div>
            <h3>3. 座標軸樣式</h3>
            <div class="row-group">
                <div class="control-group">
                    <label>座標軸/數字顯示</label>
                    <select id="axisStyle">
                        <option value="show">顯示座標軸與數字</option>
                        <option value="hideNum">隱藏刻度數字 (保留軸與標記)</option>
                        <option value="hide">隱藏座標軸與數字 (純格線)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>軸線粗細 (px)</label>
                    <input type="number" id="axisWidth" value="3" min="1" max="10">
                </div>
            </div>
        </div>

        <div>
            <h3>4. 背景格線樣式</h3>
            <div class="row-group">
                <div class="control-group">
                    <label>格線型態</label>
                    <select id="gridStyle">
                        <option value="solid">實線 (Solid)</option>
                        <option value="dashed" selected>虛線 (Dashed)</option>
                        <option value="none">沒有格線 (None)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>格線粗細 (px)</label>
                    <input type="number" id="gridWidth" value="1" min="1" max="10">
                </div>
            </div>
            <div class="control-group">
                <label>格線顏色</label>
                <input type="color" id="gridColor" value="#e1e4e8">
            </div>
        </div>

        <div>
            <h3>5. 畫布尺寸與形狀</h3>
            <div class="checkbox-group">
                <input type="checkbox" id="lockSquare" checked>
                <label for="lockSquare">鎖定為正方形 (等比例)</label>
            </div>
            <div class="row-group">
                <div class="control-group">
                    <label>顯示寬度 (px)</label>
                    <input type="number" id="canvasWidth" value="650" min="200" max="2000">
                </div>
                <div class="control-group">
                    <label>顯示高度 (px)</label>
                    <input type="number" id="canvasHeight" value="650" min="200" max="2000">
                </div>
            </div>
        </div>

        <div>
            <h3>6. 輸出清晰度</h3>
            <div class="control-group">
                <label style="color: #e63946; font-weight: bold;">下載圖片放大倍率</label>
                <select id="exportScale">
                    <option value="1">1倍 (普通標準)</option>
                    <option value="2">2倍 (網頁清晰)</option>
                    <option value="4" selected>4倍 (極致高清 - 推薦印刷)</option>
                    <option value="8">8倍 (論文印刷級)</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-download" onclick="downloadHighResCanvas()">下載超清白底圖片 (PNG)</button>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <canvas id="coordCanvas"></canvas>
        </div>
    </div>

    <div class="right-sidebar">
        <div>
            <h3>7. 函數與幾何圖形</h3>
            <div class="action-bar">
                <button class="btn-add" onclick="addFunctionCard('', null, null)">+ 新增空白函數</button>
                <select class="select-quick" id="quickSelectFunc" onchange="quickAddFunction(this)">
                    <option value="" disabled selected>⚡ 常用中學函數快選</option>
                    <option value="x">一次函數：y = x</option>
                    <option value="2x-3">一次函數：y = 2x - 3</option>
                    <option value="x^2">二次拋物線：y = x²</option>
                    <option value="x^2-2x-3">二次拋物線：y = x² - 2x - 3</option>
                    <option value="1/x">反比例函數：y = 1/x</option>
                    <option value="4/x">反比例函數：y = 4/x</option>
                    <option value="x^3">高次函數：y = x³</option>
                    <option value="sin(x)">三角函數：y = sin(x)</option>
                    <option value="cos(x)">三角函數：y = cos(x)</option>
                    <option value="abs(x)">絕對值函數：y = |x|</option>
                </select>
            </div>
            <div class="action-bar">
                <button class="btn-add" onclick="addCircleCard()" style="background:#e67e22;">+ 新增圓形</button>
                <button class="btn-add" onclick="addEllipseCard()" style="background:#9b59b6;">+ 新增橢圓</button>
            </div>
            <div id="graphicsList"></div>
        </div>

        <div>
            <h3>8. 點位標示 (x, y)</h3>
            <button class="btn-add" onclick="addPointCard()" style="background:#5856d6; margin-bottom:10px;">+ 新增座標點</button>
            <div id="pointList"></div>
        </div>
    </div>
</div>

<script>
    let customGraphics = [];
    let customPoints = [];

    function handleSync(e) {
        const lockSquare = document.getElementById('lockSquare').checked;
        if (!lockSquare) return;
        const targetId = e.target.id;

        if (targetId === 'canvasWidth') document.getElementById('canvasHeight').value = e.target.value;
        else if (targetId === 'canvasHeight') document.getElementById('canvasWidth').value = e.target.value;

        if (targetId === 'minX') document.getElementById('minY').value = e.target.value;
        else if (targetId === 'maxX') document.getElementById('maxY').value = e.target.value;
        else if (targetId === 'minY') document.getElementById('minX').value = e.target.value;
        else if (targetId === 'maxY') document.getElementById('maxX').value = e.target.value;
    }

    function quickAddFunction(selectObj) {
        const expr = selectObj.value;
        if (!expr) return;
        addFunctionCard(expr, null, null);
        selectObj.value = ""; 
    }

    // 1. 函數卡片
    function addFunctionCard(defaultExpr = '', defaultMin = null, defaultMax = null) {
        const id = 'gfx_' + Date.now() + Math.floor(Math.random()*1000);
        const html = `
            <div class="item-card" id="${id}" data-type="function">
                <div class="item-header">
                    <label style="font-weight:bold; color:#007aff;">📈 函數方程式 y = f(x)</label>
                    <button class="btn-del" onclick="removeItem('${id}')">刪除</button>
                </div>
                <div class="control-group">
                    <input type="text" class="func-expr" placeholder="例如: x^2 - 2" value="${defaultExpr}">
                    <span class="tip-text">支援: +, -, *, /, ^ (平方), sin(x), cos(x), abs(x)</span>
                </div>
                <div class="row-group">
                    <div class="control-group"><label>定義域下限</label><input type="number" class="func-min" step="any" value="${defaultMin !== null ? defaultMin : ''}"></div>
                    <div class="control-group"><label>定義域上限</label><input type="number" class="func-max" step="any" value="${defaultMax !== null ? defaultMax : ''}"></div>
                </div>
                <div class="row-group" style="grid-template-columns: 2fr 1fr; align-items:center;">
                    <div class="control-group"><label>粗細</label><input type="number" class="gfx-width" value="3" min="1"></div>
                    <div class="control-group"><label>顏色</label><input type="color" class="gfx-color" value="#007aff"></div>
                </div>
            </div>
        `;
        document.getElementById('graphicsList').insertAdjacentHTML('beforeend', html);
        bindDynamicEvents();
        drawPreview();
    }

    // 💡 格式化圓與橢圓的項 (處理正負號與隱藏 0)
    function formatTerm(variable, value) {
        if (value === 0) return `${variable}²`;
        const sign = value > 0 ? '-' : '+';
        const absVal = Math.abs(value);
        return `(${variable} ${sign} ${parseFloat(absVal.toFixed(4))})²`;
    }

    // 更新圓形和橢圓的解析方程式
    function updateEquations() {
        document.querySelectorAll('#graphicsList .item-card').forEach(card => {
            const type = card.getAttribute('data-type');
            const eqBox = card.querySelector('.equation-box');
            if (!eqBox) return;

            if (type === 'circle') {
                const h = parseFloat(card.querySelector('.circle-h').value) || 0;
                const k = parseFloat(card.querySelector('.circle-k').value) || 0;
                const r = parseFloat(card.querySelector('.circle-r').value) || 0;
                
                const xPart = formatTerm('x', h);
                const yPart = formatTerm('y', k);
                const r2 = parseFloat((r * r).toFixed(4));
                
                eqBox.innerText = `${xPart} + ${yPart} = ${r2}`;
            } else if (type === 'ellipse') {
                const h = parseFloat(card.querySelector('.ellipse-h').value) || 0;
                const k = parseFloat(card.querySelector('.ellipse-k').value) || 0;
                const a = parseFloat(card.querySelector('.ellipse-a').value) || 0;
                const b = parseFloat(card.querySelector('.ellipse-b').value) || 0;
                
                const xPart = formatTerm('x', h);
                const yPart = formatTerm('y', k);
                const a2 = parseFloat((a * a).toFixed(4));
                const b2 = parseFloat((b * b).toFixed(4));
                
                eqBox.innerText = `${xPart}/${a2} + ${yPart}/${b2} = 1`;
            }
        });
    }

    // 2. 圓形卡片 (自帶動態解析式)
    function addCircleCard() {
        const id = 'gfx_' + Date.now() + Math.floor(Math.random()*1000);
        const html = `
            <div class="item-card" id="${id}" data-type="circle">
                <div class="item-header">
                    <label style="font-weight:bold; color:#e67e22;">⭕ 幾何圓形</label>
                    <button class="btn-del" onclick="removeItem('${id}')">刪除</button>
                </div>
                <div class="row-group">
                    <div class="control-group"><label>圓心 h (X)</label><input type="number" class="circle-h" value="0" step="any"></div>
                    <div class="control-group"><label>圓心 k (Y)</label><input type="number" class="circle-k" value="0" step="any"></div>
                </div>
                <div class="control-group">
                    <label>半徑 r</label>
                    <input type="number" class="circle-r" value="3" min="0.001" step="any">
                </div>
                <div class="equation-box" title="點擊可全選複製"></div>
                <div class="row-group" style="grid-template-columns: 2fr 1fr; align-items:center;">
                    <div class="control-group"><label>粗細</label><input type="number" class="gfx-width" value="3" min="1"></div>
                    <div class="control-group"><label>顏色</label><input type="color" class="gfx-color" value="#e67e22"></div>
                </div>
            </div>
        `;
        document.getElementById('graphicsList').insertAdjacentHTML('beforeend', html);
        bindDynamicEvents();
        updateEquations();
        drawPreview();
    }

    // 3. 橢圓卡片 (自帶動態解析式)
    function addEllipseCard() {
        const id = 'gfx_' + Date.now() + Math.floor(Math.random()*1000);
        const html = `
            <div class="item-card" id="${id}" data-type="ellipse">
                <div class="item-header">
                    <label style="font-weight:bold; color:#9b59b6;">⬭ 幾何橢圓</label>
                    <button class="btn-del" onclick="removeItem('${id}')">刪除</button>
                </div>
                <div class="row-group">
                    <div class="control-group"><label>中心 h (X)</label><input type="number" class="ellipse-h" value="0" step="any"></div>
                    <div class="control-group"><label>中心 k (Y)</label><input type="number" class="ellipse-k" value="0" step="any"></div>
                </div>
                <div class="row-group">
                    <div class="control-group"><label>X半軸長 a</label><input type="number" class="ellipse-a" value="4" min="0.001" step="any"></div>
                    <div class="control-group"><label>Y半軸長 b</label><input type="number" class="ellipse-b" value="2" min="0.001" step="any"></div>
                </div>
                <div class="equation-box" title="點擊可全選複製"></div>
                <div class="row-group" style="grid-template-columns: 2fr 1fr; align-items:center;">
                    <div class="control-group"><label>粗細</label><input type="number" class="gfx-width" value="3" min="1"></div>
                    <div class="control-group"><label>顏色</label><input type="color" class="ellipse-b" value="#9b59b6"></div>
                </div>
            </div>
        `;
        document.getElementById('graphicsList').insertAdjacentHTML('beforeend', html);
        bindDynamicEvents();
        updateEquations();
        drawPreview();
    }

    // 4. 定位座標點卡片
    function addPointCard() {
        const id = 'point_' + Date.now() + Math.floor(Math.random()*1000);
        const html = `
            <div class="item-card" id="${id}">
                <div class="item-header">
                    <label style="font-weight:bold; color:#5856d6;">📍 座標點 (x, y)</label>
                    <button class="btn-del" onclick="removeItem('${id}')">刪除</button>
                </div>
                <div class="row-group">
                    <div class="control-group"><label>X 座標</label><input type="number" class="pt-x" value="2" step="any"></div>
                    <div class="control-group"><label>Y 座標</label><input type="number" class="pt-y" value="3" step="any"></div>
                </div>
                <div class="row-group" style="grid-template-columns: 1.5fr 1fr; align-items:center;">
                    <div class="checkbox-group" style="margin:0;">
                        <input type="checkbox" class="pt-label" checked id="lbl_${id}">
                        <label for="lbl_${id}">顯示座標標籤</label>
                    </div>
                    <div class="control-group"><label>顏色</label><input type="color" class="pt-color" value="#5856d6"></div>
                </div>
            </div>
        `;
        document.getElementById('pointList').insertAdjacentHTML('beforeend', html);
        bindDynamicEvents();
        drawPreview();
    }

    function removeItem(id) {
        document.getElementById(id).remove();
        drawPreview();
    }

    function collectInputs() {
        customGraphics = [];
        document.querySelectorAll('#graphicsList .item-card').forEach(card => {
            const type = card.getAttribute('data-type');
            const item = {
                type: type,
                width: parseFloat(card.querySelector('.gfx-width').value) || 3,
                color: card.querySelector('.gfx-color').value
            };

            if (type === 'function') {
                item.expr = card.querySelector('.func-expr').value;
                item.min = card.querySelector('.func-min').value !== '' ? parseFloat(card.querySelector('.func-min').value) : null;
                item.max = card.querySelector('.func-max').value !== '' ? parseFloat(card.querySelector('.func-max').value) : null;
            } else if (type === 'circle') {
                item.h = parseFloat(card.querySelector('.circle-h').value) || 0;
                item.k = parseFloat(card.querySelector('.circle-k').value) || 0;
                item.r = parseFloat(card.querySelector('.circle-r').value) || 0;
            } else if (type === 'ellipse') {
                item.h = parseFloat(card.querySelector('.ellipse-h').value) || 0;
                item.k = parseFloat(card.querySelector('.ellipse-k').value) || 0;
                item.a = parseFloat(card.querySelector('.ellipse-a').value) || 0;
                item.b = parseFloat(card.querySelector('.ellipse-b').value) || 0;
            }
            customGraphics.push(item);
        });

        customPoints = [];
        document.querySelectorAll('#pointList .item-card').forEach(card => {
            customPoints.push({
                x: card.querySelector('.pt-x').value !== '' ? parseFloat(card.querySelector('.pt-x').value) : 0,
                y: card.querySelector('.pt-y').value !== '' ? parseFloat(card.querySelector('.pt-y').value) : 0,
                showLabel: card.querySelector('.pt-label').checked,
                color: card.querySelector('.pt-color').value
            });
        });
    }

    function bindDynamicEvents() {
        document.querySelectorAll('.right-sidebar input, .right-sidebar select').forEach(input => {
            input.removeEventListener('input', onRightSidebarChange);
            input.addEventListener('input', onRightSidebarChange);
        });
    }

    function onRightSidebarChange() {
        updateEquations();
        drawPreview();
    }

    function drawTextWithMask(ctx, text, x, y, fontSize, isXAxis) {
        const showMask = document.getElementById('textMask').checked;
        if (showMask) {
            ctx.save();
            const textWidth = ctx.measureText(text).width;
            ctx.fillStyle = '#ffffff'; 
            if (isXAxis) {
                const bgWidth = textWidth + 6;  
                const bgHeight = fontSize + 4; 
                ctx.fillRect(x - bgWidth / 2, y - fontSize + 2, bgWidth, bgHeight);
            } else {
                const paddingLR = 3; 
                const bgWidth = textWidth + paddingLR * 2;  
                const bgHeight = fontSize + 4; 
                ctx.fillRect(x - textWidth - paddingLR, y - fontSize + 4, bgWidth, bgHeight);
            }
            ctx.restore();
        }
        ctx.fillText(text, x, y);
    }

    function evaluateExpression(expr, xValue) {
        try {
            let cleanExpr = expr.trim();
            if (!cleanExpr) return NaN;

            cleanExpr = cleanExpr.replace(/\bpi\b/gi, 'Math.PI');
            cleanExpr = cleanExpr.replace(/\be\b/gi, 'Math.E');

            let previousExpr;
            do {
                previousExpr = cleanExpr;
                cleanExpr = cleanExpr.replace(/([x\d\.]+)\s*\^\s*([x\d\-\.]+)/gi, 'Math.pow($1, $2)');
                cleanExpr = cleanExpr.replace(/(\([^\^]+\))\s*\^\s*([x\d\-\.]+)/gi, 'Math.pow($1, $2)');
            } while (cleanExpr !== previousExpr);

            cleanExpr = cleanExpr.replace(/(\d+)(x)/gi, '$1*$2');
            cleanExpr = cleanExpr.replace(/([x\d\)])(\()/gi, '$1*$2');
            cleanExpr = cleanExpr.replace(/\b(sin|cos|tan|abs|sqrt|log|exp)\b/gi, 'Math.$1');

            const solver = new Function('x', `return ${cleanExpr};`);
            return solver(xValue);
        } catch (e) {
            return NaN;
        }
    }

    function renderCoordinates(canvas, targetWidth, targetHeight, renderScale) {
        collectInputs();
        const ctx = canvas.getContext('2d');
        
        canvas.width = targetWidth * renderScale;
        canvas.height = targetHeight * renderScale;
        ctx.scale(renderScale, renderScale);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, targetWidth, targetHeight);

        const minX = parseFloat(document.getElementById('minX').value);
        const maxX = parseFloat(document.getElementById('maxX').value);
        const minY = parseFloat(document.getElementById('minY').value);
        const maxY = parseFloat(document.getElementById('maxY').value);
        const step = parseFloat(document.getElementById('step').value) || 1;
        const fontSize = parseInt(document.getElementById('fontSize').value) || 16;
        const fontWeight = document.getElementById('fontWeight').value;
        
        const axisStyle = document.getElementById('axisStyle').value;
        const axisWidth = parseFloat(document.getElementById('axisWidth').value) || 2;
        const gridWidth = parseFloat(document.getElementById('gridWidth').value) || 1;
        const gridStyle = document.getElementById('gridStyle').value;
        const gridColor = document.getElementById('gridColor').value;
        
        const padding = (axisStyle !== 'hide') ? 65 : 15;
        const width = targetWidth - 2 * padding;
        const height = targetHeight - 2 * padding;

        const getX = (val) => padding + (val - minX) * (width / (maxX - minX));
        const getY = (val) => padding + height - (val - minY) * (height / (maxY - minY));
        const formatNum = (num) => parseFloat(num.toFixed(4));

        const gridOffset = (Math.round(gridWidth) % 2 === 1) ? 0.5 : 0;
        const axisOffset = (Math.round(axisWidth) % 2 === 1) ? 0.5 : 0;

        // 1. 背景格線
        if (gridStyle !== 'none' && maxX > minX && maxY > minY) {
            ctx.save();
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = gridWidth;
            ctx.beginPath();
            if (gridStyle === 'dashed') ctx.setLineDash([4, 4]);
            else ctx.setLineDash([]);

            let startX = Math.ceil(minX / step) * step;
            for (let x = startX; x <= maxX; x += step) {
                let snapX = Math.round(getX(x)) + gridOffset;
                ctx.moveTo(snapX, Math.round(getY(minY)));
                ctx.lineTo(snapX, Math.round(getY(maxY)));
            }
            let startY = Math.ceil(minY / step) * step;
            for (let y = startY; y <= maxY; y += step) {
                let snapY = Math.round(getY(y)) + gridOffset;
                ctx.moveTo(Math.round(getX(minX)), snapY);
                ctx.lineTo(Math.round(getX(maxX)), snapY);
            }
            ctx.stroke();
            ctx.restore();
        }

        const xAxisY = getY(0);
        const yAxisX = getX(0);
        const hasXAxis = xAxisY >= getY(maxY) && xAxisY <= getY(minY);
        const hasYAxis = yAxisX >= getX(minX) && yAxisX <= getX(maxX);

        // 2. 座標軸線與標籤刻度
        if (axisStyle !== 'hide' && maxX > minX && maxY > minY) {
            ctx.save();
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = axisWidth;
            ctx.lineCap = 'square'; 
            const offset = 18; 

            // X 軸與箭頭
            if (hasXAxis) {
                let snapAxisY = Math.round(xAxisY) + axisOffset;
                ctx.beginPath();
                ctx.moveTo(Math.round(getX(minX) - offset), snapAxisY); 
                ctx.lineTo(Math.round(getX(maxX) + offset - 9), snapAxisY);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(Math.round(getX(maxX) + offset - 10), snapAxisY - 5); 
                ctx.lineTo(Math.round(getX(maxX) + offset), snapAxisY); 
                ctx.lineTo(Math.round(getX(maxX) + offset - 10), snapAxisY + 5);
                ctx.stroke();
            }

            // Y 軸與箭頭
            if (hasYAxis) {
                let snapAxisX = Math.round(yAxisX) + axisOffset;
                ctx.beginPath();
                ctx.moveTo(snapAxisX, Math.round(getY(minY) + offset)); 
                ctx.lineTo(snapAxisX, Math.round(getY(maxY) - offset + 9));
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(snapAxisX - 5, Math.round(getY(maxY) - offset + 10)); 
                ctx.lineTo(snapAxisX, Math.round(getY(maxY) - offset)); 
                ctx.lineTo(snapAxisX + 5, Math.round(getY(maxY) - offset + 10));
                ctx.stroke();
            }

            ctx.fillStyle = '#333333';
            ctx.font = `${fontWeight} ${fontSize}px sans-serif`;
            const textY = hasXAxis ? xAxisY : getY(minY);
            const textX = hasYAxis ? yAxisX : getX(minX);

            // X 軸刻度數字
            let startTickX = Math.ceil(minX / step) * step;
            for (let x = startTickX; x <= maxX; x += step) {
                if (formatNum(x) === 0) continue;
                const currentX = getX(x);
                if (hasXAxis) {
                    let snapTickX = Math.round(currentX) + axisOffset;
                    let snapAxisY = Math.round(xAxisY) + axisOffset;
                    ctx.beginPath(); 
                    ctx.moveTo(snapTickX, snapAxisY - 3); 
                    ctx.lineTo(snapTickX, snapAxisY + 3); 
                    ctx.stroke();
                }
                if (axisStyle !== 'hideNum') {
                    ctx.textAlign = 'center';
                    drawTextWithMask(ctx, formatNum(x).toString(), currentX, textY + fontSize + 4, fontSize, true);
                }
            }

            // Y 軸刻度數字
            let startTickY = Math.ceil(minY / step) * step;
            for (let y = startTickY; y <= maxY; y += step) {
                if (formatNum(y) === 0) continue;
                const currentY = getY(y);
                if (hasYAxis) {
                    let snapTickY = Math.round(currentY) + axisOffset;
                    let snapAxisX = Math.round(yAxisX) + axisOffset;
                    ctx.beginPath(); 
                    ctx.moveTo(snapAxisX - 3, snapTickY); 
                    ctx.lineTo(snapAxisX + 3, snapTickY); 
                    ctx.stroke();
                }
                if (axisStyle !== 'hideNum') {
                    ctx.textAlign = 'right';
                    drawTextWithMask(ctx, formatNum(y).toString(), textX - 8, currentY + (fontSize / 3), fontSize, false);
                }
            }
            
            // 原點 0 
            if (axisStyle !== 'hideNum' && formatNum(minX) <= 0 && formatNum(maxX) >= 0 && formatNum(minY) <= 0 && formatNum(maxY) >= 0) {
                ctx.textAlign = 'center';
                ctx.fillText('0', yAxisX - 8, xAxisY + fontSize + 2);
            }
            
            // 軸標記
            ctx.font = `bold ${fontSize + 2}px sans-serif`;
            ctx.textAlign = 'center';
            if (hasXAxis) ctx.fillText('x', getX(maxX) + offset + 12, xAxisY + 5);
            if (hasYAxis) ctx.fillText('y', yAxisX, getY(maxY) - offset - 12);
            ctx.restore();
        }

        // 3. 繪製函數與參數化幾何圖形
        customGraphics.forEach(item => {
            ctx.save();
            ctx.strokeStyle = item.color;
            ctx.lineWidth = item.width;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            if (item.type === 'function') {
                if (!item.expr.trim()) { ctx.restore(); return; }
                ctx.beginPath();
                const rMin = item.min !== null ? Math.max(minX, item.min) : minX;
                const rMax = item.max !== null ? Math.min(maxX, item.max) : maxX;

                let firstPoint = true;
                const totalSteps = width * 3; 

                for (let i = 0; i <= totalSteps; i++) {
                    const currentX = minX + (i / totalSteps) * (maxX - minX);
                    if (currentX < rMin || currentX > rMax) { firstPoint = true; continue; }

                    const currentY = evaluateExpression(item.expr, currentX);
                    if (isNaN(currentY) || !isFinite(currentY) || Math.abs(currentY) > Math.abs(maxY - minY) * 15) { firstPoint = true; continue; }

                    const canvasX = getX(currentX);
                    const canvasY = getY(currentY);

                    if (canvasY < getY(maxY) - 30 || canvasY > getY(minY) + 30) { firstPoint = true; continue; }

                    if (firstPoint) { ctx.moveTo(canvasX, canvasY); firstPoint = false; }
                    else { ctx.lineTo(canvasX, canvasY); }
                }
                ctx.stroke();

            } else if (item.type === 'circle') {
                if (item.r <= 0) { ctx.restore(); return; }
                ctx.beginPath();
                for (let theta = 0; theta <= Math.PI * 2 + 0.05; theta += 0.02) {
                    const cx = item.h + item.r * Math.cos(theta);
                    const cy = item.k + item.r * Math.sin(theta);
                    if (theta === 0) ctx.moveTo(getX(cx), getY(cy));
                    else ctx.lineTo(getX(cx), getY(cy));
                }
                ctx.stroke();

            } else if (item.type === 'ellipse') {
                if (item.a <= 0 || item.b <= 0) { ctx.restore(); return; }
                ctx.beginPath();
                for (let theta = 0; theta <= Math.PI * 2 + 0.05; theta += 0.02) {
                    const cx = item.h + item.a * Math.cos(theta);
                    const cy = item.k + item.b * Math.sin(theta);
                    if (theta === 0) ctx.moveTo(getX(cx), getY(cy));
                    else ctx.lineTo(getX(cx), getY(cy));
                }
                ctx.stroke();
            }
            ctx.restore();
        });

        // 4. 定位點繪製
        customPoints.forEach(pt => {
            if (pt.x < minX || pt.x > maxX || pt.y < minY || pt.y > maxY) return;
            ctx.save();
            const cx = getX(pt.x);
            const cy = getY(pt.y);

            ctx.fillStyle = pt.color;
            ctx.beginPath();
            ctx.arc(cx, cy, 5.5, 0, Math.PI * 2);
            ctx.fill();

            if (pt.showLabel) {
                ctx.fillStyle = '#222222';
                ctx.font = `bold ${fontSize - 2}px sans-serif`;
                ctx.textAlign = 'left';
                const labelText = `(${formatNum(pt.x)}, ${formatNum(pt.y)})`;
                ctx.fillText(labelText, cx + 8, cy - 4);
            }
            ctx.restore();
        });
    }

    function drawPreview() {
        const canvas = document.getElementById('coordCanvas');
        const cWidth = parseInt(document.getElementById('canvasWidth').value) || 650;
        const cHeight = parseInt(document.getElementById('canvasHeight').value) || 650;
        const dpr = window.devicePixelRatio || 1;

        canvas.style.width = cWidth + 'px';
        canvas.style.height = cHeight + 'px';

        renderCoordinates(canvas, cWidth, cHeight, dpr);
    }

    function downloadHighResCanvas() {
        const cWidth = parseInt(document.getElementById('canvasWidth').value) || 650;
        const cHeight = parseInt(document.getElementById('canvasHeight').value) || 650;
        const exportScale = parseInt(document.getElementById('exportScale').value) || 4;

        const tempCanvas = document.createElement('canvas');
        renderCoordinates(tempCanvas, cWidth, cHeight, exportScale);

        const link = document.createElement('a');
        link.download = `直角座標系_${cWidth * exportScale}x${cHeight * exportScale}.png`;
        link.href = tempCanvas.toDataURL('image/png');
        link.click();
    }

    window.onload = function() {
        const inputs = document.querySelectorAll('.sidebar input, .sidebar select');
        inputs.forEach(input => {
            input.addEventListener('input', (e) => { handleSync(e); drawPreview(); });
            input.addEventListener('change', (e) => { handleSync(e); drawPreview(); });
        });

        document.getElementById('lockSquare').addEventListener('change', function(e) {
            if (this.checked) {
                document.getElementById('canvasHeight').value = document.getElementById('canvasWidth').value;
                document.getElementById('minY').value = document.getElementById('minX').value;
                document.getElementById('maxY').value = document.getElementById('maxX').value;
                drawPreview();
            }
        });

        // 🌟 預設乾淨空白
        drawPreview(); 
    };
</script>
