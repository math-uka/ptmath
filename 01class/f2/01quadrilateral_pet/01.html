<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>平行四邊形判定實驗 | 幾何畫板</title>
    <style>
        * {
            user-select: none; /* 避免拖拽時選中文字，提升觸控感 */
        }
        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            margin: 0;
            padding: 2vw;
            background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .main-card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            border-radius: 2.5rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 1.5rem 1.8rem 2rem 1.8rem;
            transition: all 0.2s;
        }
        h1 {
            text-align: center;
            font-size: 1.9rem;
            margin-top: 0;
            margin-bottom: 1.2rem;
            color: #1e2f3e;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1:before {
            content: "📐";
            font-size: 2rem;
        }
        h1:after {
            content: "🔍";
            font-size: 2rem;
        }
        .flex-layout {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: flex-start;
        }
        .canvas-area {
            flex: 2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .info-panel {
            flex: 1.2;
            min-width: 280px;
            background: #fefefe;
            border-radius: 2rem;
            padding: 1.2rem 1.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .ctrl-btn {
            background: #2c3e4e;
            border: none;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }
        .ctrl-btn:active {
            transform: scale(0.96);
            background: #1e2f3a;
        }
        .info-section {
            margin: 1.2rem 0;
            padding: 0.6rem 0;
            border-bottom: 1px solid #ddd;
        }
        .info-section p {
            margin: 0.4rem 0;
            font-size: 1.05rem;
        }
        .edge-row, .angle-row {
            display: flex;
            justify-content: space-between;
            background: #f4f7fb;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            margin: 0.5rem 0;
            font-weight: 500;
        }
        .result-area {
            background: #eef2fa;
            border-radius: 2rem;
            padding: 0.8rem 1rem;
            margin-top: 1.2rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .result-bold {
            color: #0f5b2e;
            background: #e0f2e9;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }
        .badge {
            font-size: 0.85rem;
            color: #3a5c6e;
            text-align: center;
            margin-top: 0.2rem;
        }
        canvas {
            border-radius: 28px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            background: #ffffff;
            width: 100%;
            height: auto;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        @media (max-width: 680px) {
            .main-card {
                padding: 1rem;
            }
            .info-panel {
                padding: 1rem;
            }
            .ctrl-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.9rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #4a6272;
            margin-top: 1.5rem;
        }
    </style>
    <!-- 引入 p5.js 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
</head>
<body>
<div class="main-card">
    <h1>平行四邊形判定實驗</h1>
    <div class="flex-layout">
        <div class="canvas-area">
            <div class="button-group">
                <button id="edgeButton" class="ctrl-btn">📏 顯示邊長</button>
                <button id="angleButton" class="ctrl-btn">📐 顯示角度</button>
            </div>
            <div id="canvasContainer"></div>
            <div class="badge">✨ 拖曳任意紅色頂點 | 自動吸附格點 | 防止自交與共線</div>
        </div>
        <div class="info-panel">
            <div style="font-weight:600; margin-bottom:8px;">🧪 實驗目標：對邊相等的四邊形 ⇔ 平行四邊形？</div>
            <div id="edgesSection" style="display: none;">
                <div class="info-section">
                    <strong>📐 邊長 (單位格)</strong>
                    <div class="edge-row"><span>AB</span> <span id="abLen">0.0</span> <span> vs CD</span> <span id="cdLen">0.0</span></div>
                    <div class="edge-row"><span>BC</span> <span id="bcLen">0.0</span> <span> vs DA</span> <span id="daLen">0.0</span></div>
                </div>
            </div>
            <div id="anglesSection" style="display: none;">
                <div class="info-section">
                    <strong>📐 內角度數 (度)</strong>
                    <div class="angle-row">∠A = <span id="angleA">0</span>° &nbsp;&nbsp; ∠B = <span id="angleB">0</span>°</div>
                    <div class="angle-row">∠C = <span id="angleC">0</span>° &nbsp;&nbsp; ∠D = <span id="angleD">0</span>°</div>
                </div>
            </div>
            <div class="result-area">
                🧾 判定結果：<span id="result">請拖動頂點實驗</span>
            </div>
            <div class="badge" style="margin-top:12px;">💡 提示：對邊相等時即為平行四邊形 (實驗驗證)</div>
        </div>
    </div>
    <footer>📌 拖曳頂點改變形狀 | 自動防止三點共線及邊交叉 | 邊長/角度即時更新</footer>
</div>

<script src="https://nokin.vercel.app/app/2-quadrilateral/app.js"></script>
</body>
</html>
