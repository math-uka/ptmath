<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>多張圖轉GIF</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial,"Microsoft JhengHei",sans-serif;max-width:940px;margin:40px auto;padding:20px;background:#f5f5f5;line-height:1.6}
h1{text-align:center;color:#333}
.upload{border:3px dashed #999;padding:40px;text-align:center;background:white;border-radius:12px;margin:20px 0}
.thumbs{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin:30px 0}
.thumb-wrapper{text-align:center;width:160px;background:#fff;padding:10px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);cursor:move;user-select:none;transition:all 0.2s;border:2px solid transparent;position:relative}
.thumb-wrapper.dragging{border:2px dashed #28a745;opacity:0.7}
.thumb-wrapper img{max-width:120px;max-height:120px;border-radius:8px;background:#fff}
.thumb-wrapper input{width:70px;margin-top:6px}
.remove-btn{position:absolute;top:8px;right:8px;background:#dc3545;color:white;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.remove-btn:hover{background:#c82333}
.status{text-align:center;font-size:19px;margin:20px;padding:15px;border-radius:8px}
.waiting{background:#fff3cd;color:#856404}
.ready{background:#d4edda;color:#155724}
.controls{text-align:center;margin:30px}
button{padding:15px 40px;font-size:20px;background:#28a745;color:white;border:none;border-radius:8px;cursor:pointer}
button:hover{background:#218838}
button:disabled{background:#ccc;cursor:not-allowed}
#rerender{background:#007bff}
#rerender:hover{background:#0069d9}
#gifPreview{max-width:100%;border:5px solid #28a745;border-radius:12px;background:#000;box-shadow:0 8px 25px rgba(0,0,0,.3)}
#error{display:none;background:#f8d7da;color:#721c24;padding:10px;border-radius:5px;margin:10px;text-align:center}
</style>
</head>
<body>
<h1>多張圖轉GIF</h1>
<div class="upload">
  <p>一次選多張圖片（建議最多30張）<br>
     <strong>支援分批上傳！</strong> 上傳一組後，再選新圖片會<strong>自動追加</strong>，不會清空已上傳的圖<br>
     自動等比＋淡入淡出＋每張獨立時間＋<strong>可拖曳調整順序！</strong></p>
  <input type="file" id="files" accept="image/*" multiple>
  <br><br><button id="clear">清空全部重來</button>
</div>
<div id="error"></div>
<div class="thumbs" id="thumbs"></div>

<div style="text-align:center;margin:40px auto">
  <h3>即時預覽</h3>
  <img id="gifPreview" style="display:none">
  <p id="tip" style="color:#666;font-size:18px">上傳後這裡會出現跟最終檔一模一樣的動畫</p>
</div>

<div class="status waiting" id="msg">請上傳圖片…</div>
<div class="controls">
  全域時間 <input type="number" id="ms" value="600" min="50" max="10000" style="width:100px"> ms<br><br>
  <label><input type="checkbox" id="loop" checked> 循環播放</label>
  <label style="margin-left:20px"><input type="checkbox" id="trans"> 透明補白</label>
  <label style="margin-left:20px"><input type="checkbox" id="crossfade"> 淡入淡出</label>
  <br><br>
  <button id="rerender">重新渲染預覽</button>
  <button id="btn" disabled style="margin-left:20px">生成並下載 GIF</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.min.js"></script>
<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let rawImages = [], delays = [], canvasSize = {w:900, h:900}, workerBlob = null, currentGif = null;
let draggedItem = null;

// 載入 Worker
async function loadWorker() {
  if (workerBlob) return workerBlob;
  const res = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
  const blob = await res.blob();
  workerBlob = URL.createObjectURL(blob);
  return workerBlob;
}

function showError(msg) {
  $('#error').textContent = msg;
  $('#error').style.display = 'block';
}

// 建立單張縮圖 wrapper（含移除按鈕）
function createThumbWrapper(url, msValue) {
  const wrapper = document.createElement('div');
  wrapper.className = 'thumb-wrapper';
  wrapper.draggable = true;
  wrapper.innerHTML = `
    <img src="${url}">
    <div style="margin-top:8px">
      <input type="number" value="${msValue}" min="50" max="10000" style="width:70px">
      <button class="remove-btn" title="移除這張圖片">×</button>
    </div>
    <div style="font-size:12px;color:#666">ms</div>
  `;

  const input = wrapper.querySelector('input');
  const removeBtn = wrapper.querySelector('.remove-btn');

  input.oninput = function() {
    const all = $$('.thumb-wrapper');
    const idx = Array.from(all).indexOf(wrapper);
    if (idx >= 0) delays[idx] = this.valueAsNumber || 600;
  };

  // 移除按鈕
  removeBtn.onclick = () => {
    const all = $$('.thumb-wrapper');
    const idx = Array.from(all).indexOf(wrapper);
    if (idx >= 0) {
      URL.revokeObjectURL(rawImages[idx]);
      rawImages.splice(idx, 1);
      delays.splice(idx, 1);
      wrapper.remove();
      remake();
    }
  };

  // 拖曳事件
  wrapper.addEventListener('dragstart', e => {
    draggedItem = wrapper;
    setTimeout(() => wrapper.classList.add('dragging'), 0);
  });
  wrapper.addEventListener('dragend', () => {
    wrapper.classList.remove('dragging');
    draggedItem = null;
  });
  wrapper.addEventListener('dragover', e => e.preventDefault());
  wrapper.addEventListener('drop', e => {
    e.preventDefault();
    if (draggedItem && draggedItem !== wrapper) {
      const all = $$('.thumb-wrapper');
      const from = Array.from(all).indexOf(draggedItem);
      const to = Array.from(all).indexOf(wrapper);
      [rawImages[from], rawImages[to]] = [rawImages[to], rawImages[from]];
      [delays[from], delays[to]] = [delays[to], delays[from]];
      if (from < to) wrapper.after(draggedItem);
      else wrapper.before(draggedItem);
      remake();
    }
  });

  return wrapper;
}

// 分批上傳
async function addNewFiles(newFiles) {
  if (newFiles.length === 0) return;

  const defaultMs = $('#ms').valueAsNumber || 600;
  const isFirstUpload = rawImages.length === 0;

  if (isFirstUpload) {
    rawImages = [];
    delays = [];
    $('#thumbs').innerHTML = '';
    $('#error').style.display = 'none';
    $('#gifPreview').style.display = 'none';
  }

  $('#msg').textContent = isFirstUpload ? '處理中…' : `正在追加 ${newFiles.length} 張圖片…`;
  $('#msg').className = 'status waiting';

  let newMw = 0, newMh = 0;
  const newUrls = [];
  for (const file of newFiles) {
    const url = URL.createObjectURL(file);
    const img = await new Promise(r => {
      const i = new Image();
      i.onload = () => r(i);
      i.src = url;
    });
    newMw = Math.max(newMw, img.width);
    newMh = Math.max(newMh, img.height);
    newUrls.push(url);
  }

  let overallMw = newMw;
  let overallMh = newMh;
  if (!isFirstUpload) {
    for (const url of rawImages) {
      const img = await new Promise(r => {
        const i = new Image();
        i.onload = () => r(i);
        i.src = url;
      });
      overallMw = Math.max(overallMw, img.width);
      overallMh = Math.max(overallMh, img.height);
    }
  }

  const target = 900;
  canvasSize = overallMw > overallMh 
    ? {w: target, h: Math.round(target * overallMh / overallMw)} 
    : {w: Math.round(target * overallMw / overallMh), h: target};

  for (let i = 0; i < newFiles.length; i++) {
    const url = newUrls[i];
    rawImages.push(url);
    delays.push(defaultMs);
    const wrapper = createThumbWrapper(url, defaultMs);
    $('#thumbs').appendChild(wrapper);
  }

  await remake();

  if (isFirstUpload) {
    $('#msg').textContent = '預覽完成！可拖曳排序、調整每張時間';
    $('#msg').className = 'status ready';
    $('#btn').disabled = false;
  } else {
    $('#msg').textContent = `✅ 已追加 ${newFiles.length} 張！總共 ${rawImages.length} 張`;
    $('#msg').className = 'status ready';
  }

  $('#files').value = '';
}

// 同步畫面上的時間
function syncDelaysFromInputs() {
  const all = $$('.thumb-wrapper');
  delays = Array.from(all).map(wrapper => {
    const inp = wrapper.querySelector('input');
    return inp ? (inp.valueAsNumber || 600) : 600;
  });
}

// 產生 GIF
async function remake(isFinal = false) {
  if (rawImages.length === 0) {
    $('#gifPreview').style.display = 'none';
    return;
  }
  $('#msg').textContent = isFinal ? '最終渲染中…' : '產生預覽中…';
  $('#msg').className = 'status waiting';
  $('#error').style.display = 'none';

  try {
    await loadWorker();
    const bgColor = '#ffffff';

    const canvases = await Promise.all(rawImages.map(async url => {
      const img = await new Promise(r => {
        const i = new Image();
        i.onload = () => r(i);
        i.src = url;
      });
      const c = document.createElement('canvas');
      c.width = canvasSize.w;
      c.height = canvasSize.h;
      const ctx = c.getContext('2d');
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, c.width, c.height);
      const scale = Math.min(c.width / img.width, c.height / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (c.width - w) / 2, (c.height - h) / 2, w, h);
      return c;
    }));

    currentGif = new GIF({
      workers: isFinal ? 4 : 2,
      quality: isFinal ? 5 : 10,
      width: canvasSize.w,
      height: canvasSize.h,
      workerScript: workerBlob,
      background: bgColor
    });

    if (isFinal) currentGif.on('progress', p => $('#msg').textContent = `最終渲染中…${Math.round(p*100)}%`);

    currentGif.on('finished', blob => {
      const url = URL.createObjectURL(blob);
      $('#gifPreview').src = url;
      $('#gifPreview').style.display = 'block';
      $('#tip').innerHTML = '<strong style="color:#28a745;">預覽完成！可拖曳調整順序</strong>';

      if (isFinal) {
        const a = document.createElement('a');
        a.href = url;
        a.download = $('#crossfade').checked 
          ? `淡入淡出_自訂順序_${rawImages.length}張.gif` 
          : `完美GIF_可拖曳排序_${rawImages.length}張.gif`;
        a.click();

        $('#btn').textContent = '下載完成！再做一個？';
        setTimeout(() => {
          $('#btn').disabled = false;
          $('#btn').textContent = '生成並下載 GIF';
        }, 3000);
      } else {
        $('#msg').textContent = '預覽完成！拖曳縮圖可調整順序';
        $('#msg').className = 'status ready';
      }
    });

    const useCrossfade = $('#crossfade').checked;
    const steps = useCrossfade ? (isFinal ? 12 : 8) : 0;

    for (let i = 0; i < canvases.length; i++) {
      currentGif.addFrame(canvases[i], {delay: delays[i]});
      if (useCrossfade && i < canvases.length - 1) {
        const trans = await crossfade(canvases[i], canvases[i+1], steps);
        const d = Math.floor(delays[i] / (steps + 1));
        trans.forEach(c => currentGif.addFrame(c, {delay: d}));
      }
    }

    if (useCrossfade && $('#loop').checked && canvases.length > 1) {
      const back = await crossfade(canvases[canvases.length-1], canvases[0], steps);
      const d = Math.floor(delays[delays.length-1] / (steps + 1));
      back.forEach(c => currentGif.addFrame(c, {delay: d}));
    }

    currentGif.render();
  } catch (e) {
    showError('產生失敗：' + e.message);
    console.error(e);
  }
}

async function crossfade(c1, c2, steps) {
  const list = [];
  for (let i = 1; i <= steps; i++) {
    const c = document.createElement('canvas');
    c.width = canvasSize.w;
    c.height = canvasSize.h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.globalAlpha = 1 - i/steps;
    ctx.drawImage(c1, 0, 0);
    ctx.globalAlpha = i/steps;
    ctx.drawImage(c2, 0, 0);
    ctx.globalAlpha = 1;
    list.push(c);
  }
  return list;
}

// 事件綁定
$('#files').onchange = async e => {
  const newFiles = Array.from(e.target.files);
  if (newFiles.length === 0) return;
  await addNewFiles(newFiles);
};

$('#ms').onchange = () => {
  const v = $('#ms').valueAsNumber || 600;
  $$('.thumb-wrapper input').forEach((inp, i) => {
    if (delays[i] === (+inp.value || 600)) {
      inp.value = v;
      delays[i] = v;
    }
  });
  remake();
};

$('#rerender').onclick = () => {
  syncDelaysFromInputs();
  remake();
};

['crossfade','loop','trans'].forEach(id => $('#'+id).onchange = () => remake());

$('#clear').onclick = () => location.reload();

$('#btn').onclick = () => {
  $('#btn').disabled = true;
  $('#btn').textContent = '最終渲染中…0%';
  syncDelaysFromInputs();
  remake(true);
};
</script>
</body>
</html>
